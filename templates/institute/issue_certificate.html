{% extends "base.html" %}

{% block content %}

<h2>Issue Certificate</h2>

{% if messages %}
  {% for message in messages %}
    <div class="message {{ message.tags }}">{{ message }}</div>
  {% endfor %}
{% endif %}

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Issue Certificate</button>
</form>

{% endblock %}
